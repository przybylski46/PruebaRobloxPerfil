<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- EMBED DISCORD -->
<meta property="og:title" content="Pino (@pino)">
<meta property="og:description" content="Just a normal Roblox user 🌲">
<meta property="og:image" content="https://i.imgur.com/your-pine.png">
<meta name="theme-color" content="#00A2FF">

<title>Perfil</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f2f4f5;
}

.navbar {
  background: #232527;
  color: white;
  padding: 12px 20px;
  font-weight: 600;
}

.container {
  max-width: 1000px;
  margin: 30px auto;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
}

.profile {
  display: flex;
  gap: 20px;
  align-items: center;
}

.avatar {
  width: 130px;
  height: 130px;
  border-radius: 50%;
}

.name {
  font-size: 28px;
  font-weight: 700;
}

.username {
  color: gray;
}

.stats {
  display: flex;
  gap: 20px;
  margin-top: 10px;
  color: #555;
}

.section-title {
  font-weight: 700;
  margin-bottom: 10px;
}

</style>
</head>

<body>

<div class="navbar">Roblox</div>

<div class="container">

  <!-- PERFIL -->
  <div class="card">
    <div class="profile">
      <img id="avatar" class="avatar">
      <div>
        <div class="name" id="displayName"></div>
        <div class="username" id="username"></div>
        <div class="stats">
          <div id="friends"></div>
          <div id="followers"></div>
          <div id="following"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ABOUT -->
  <div class="card">
    <div class="section-title">About</div>
    <div id="bio"></div>
  </div>

  <!-- INFO -->
  <div class="card">
    <div class="section-title">Info</div>
    <div id="joinDate"></div>
  </div>

</div>

<script src="data.js"></script>
<script>
document.getElementById("avatar").src = data.avatar;
document.getElementById("displayName").innerText = data.displayName;
document.getElementById("username").innerText = "@" + data.username;

document.getElementById("friends").innerText = "Friends: " + data.friends;
document.getElementById("followers").innerText = "Followers: " + data.followers;
document.getElementById("following").innerText = "Following: " + data.following;

document.getElementById("bio").innerText = data.bio;
document.getElementById("joinDate").innerText = "Join Date: " + data.joinDate;
</script>

</body>
</html>
