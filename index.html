<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- EMBED -->
<meta property="og:title" content="Pino (@pino)">
<meta property="og:description" content="🌲 Solo soy un pino tranquilo">
<meta property="og:image" content="https://i.imgur.com/your-pine.png">
<meta name="theme-color" content="#00A2FF">

<title>Perfil</title>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #f2f4f5;
}

.navbar input {
  flex: 1;
  padding: 8px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

/* LOGO */
.logo img {
  width: 28px;
  height: 28px;
}

/* BUSCADOR */
.search {
  flex: 1;
  padding: 8px 12px;
  border-radius: 20px;
  border: 1px solid #ccc;
  max-width: 500px;
}

/* BOTONES */
.actions {
  display: flex;
  gap: 10px;
}

button {
  padding: 8px 14px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
}

/* Botón blanco con borde negro */
.btn-outline {
  background: white;
  color: black;
  border: 1px solid black;
}

/* Botón azul */
.btn-primary {
  background: #3466ff;
  color: white;
  border: none;
}

/* HEADER PERFIL */
.header {
  background: linear-gradient(#e5e5e5, #f2f4f5);
  padding: 40px 20px;
  text-align: center;
}

.avatar-3d {
  width: 180px;
}

/* INFO */
.profile-info {
  max-width: 1000px;
  margin: -60px auto 0;
  background: white;
  border-radius: 12px;
  padding: 20px;
}

.top-row {
  display: flex;
  align-items: center;
  gap: 20px;
}

.avatar-small {
  width: 90px;
  height: 90px;
  border-radius: 50%;
}

.name {
  font-size: 26px;
  font-weight: bold;
}

.username {
  color: gray;
}

.button {
  margin-left: auto;
  background: #3466ff;
  color: white;
  padding: 10px 20px;
  border-radius: 8px;
}

/* STATS */
.stats {
  display: flex;
  gap: 15px;
  margin-top: 15px;
}

.stat {
  background: #eee;
  padding: 8px 12px;
  border-radius: 20px;
}

/* TABS */
.tabs {
  display: flex;
  margin-top: 20px;
  border-bottom: 1px solid #ddd;
}

.tab {
  padding: 10px 15px;
  cursor: pointer;
}

.tab.active {
  border-bottom: 2px solid black;
}

/* ROPA */
.section {
  margin-top: 20px;
}

.items {
  display: flex;
  gap: 15px;
  overflow-x: auto;
}

.item {
  background: #eee;
  width: 120px;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.item img {
  width: 100%;
}
</style>

</head>

<body>

<!-- NAV -->
<div class="navbar">

  <div class="logo">
    <img src="https://i.imgur.com/tu-logo.png">
  </div>

  <input class="search" placeholder="Buscar">

  <div class="actions">
    <button class="btn-outline">Iniciar sesión</button>
    <button class="btn-primary">Registro</button>
  </div>

</div>

<!-- HEADER -->
<div class="header">
  <img id="avatar3d" class="avatar-3d">
</div>

<!-- PERFIL -->
<div class="profile-info">

  <div class="top-row">
    <img id="avatar" class="avatar-small">

    <div>
      <div id="displayName" class="name"></div>
      <div id="username" class="username"></div>
    </div>

    <div class="button">Añadir amistad</div>
  </div>

  <div class="stats">
    <div class="stat" id="friends"></div>
    <div class="stat" id="followers"></div>
    <div class="stat" id="following"></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active">Sobre mí</div>
    <div class="tab">Creaciones</div>
  </div>

  <!-- BIO -->
  <div class="section">
    <p id="bio"></p>
  </div>

  <!-- ROPA -->
  <div class="section">
    <h3>Ropa actual</h3>
    <div class="items" id="items"></div>
  </div>

</div>

<script src="data.js"></script>
<script>
document.getElementById("avatar").src = data.avatar;
document.getElementById("avatar3d").src = data.avatar;

document.getElementById("displayName").innerText = data.displayName;
document.getElementById("username").innerText = "@" + data.username;

document.getElementById("friends").innerText = data.friends + " Amigos";
document.getElementById("followers").innerText = data.followers + " Seguidores";
document.getElementById("following").innerText = data.following + " Siguiendo";

document.getElementById("bio").innerText = data.bio;

const itemsDiv = document.getElementById("items");

data.items.forEach(item => {
  const div = document.createElement("div");
  div.className = "item";
  div.innerHTML = `
    <img src="${item.img}">
    <div>${item.name}</div>
  `;
  itemsDiv.appendChild(div);
});
</script>

</body>
  </html>
