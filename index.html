<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta property="og:title" content="Pino (@PINO_69)">
<meta property="og:description" content="🌲 1 - 2 🐒">
<meta property="og:image" content="https://cdn.discordapp.com/attachments/1498040372323024906/1499449430330445944/thumb-spruce3.png?ex=69f4d69a&is=69f3851a&hm=67fc8a0b1e1555269c3540df5e0cbf38f2e81398d8ed87f429b941bf7a0f370a&">
<meta name="theme-color" content="#00A2FF">
<title>Perfil</title>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #f2f4f5;
}

/* NAVBAR - LIMPIA Y SIN REPETICIONES */
.navbar {
  background: #ffffff;
  border-bottom: 1px solid #ddd;
}

.nav-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
}

.left { display: flex; align-items: center; }
.logo { width: 28px; height: 28px; }

.center {
  flex: 1;
  display: flex;
  justify-content: center;
}

.center input {
  width: 500px;
  padding: 8px 15px;
  border-radius: 20px;
  border: 1px solid #ccc;
  background-color: #f2f4f5;
}

.right { display: flex; gap: 10px; }

/* BARRA INFERIOR - ESTILO ROBLOX EXACTO */
.nav-bottom {
  display: flex;
  justify-content: center; 
  gap: 60px;
  padding: 12px 0;
  border-top: 1px solid #eee;
}

.nav-bottom span {
  font-size: 15px;
  font-weight: 600;
  color: #393b3d;
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
}

.nav-bottom span::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -13px;
  width: 100%;
  height: 3px;
  background: #000;
  transform: scaleX(0);
  transition: transform 0.2s ease;
}

.nav-bottom span:hover::after { transform: scaleX(1); }
.nav-bottom span:hover { color: #000; }

/* BOTONES SUPERIORES */
.btn-primary {
  background: #3b5eff;
  color: white;
  border: none;
  border-radius: 20px;
  padding: 6px 14px;
  cursor: pointer;
}

.btn-outline {
  background: white;
  color: black;
  border: 1px solid #ccc;
  border-radius: 20px;
  padding: 6px 14px;
  cursor: pointer;
}

/* SECCIÓN DEL AVATAR Y PERFIL */
.header {
  background: linear-gradient(#e5e5e5, #f2f4f5);
  padding: 40px 20px;
  text-align: center;
}

.avatar-3d { width: 180px; }

.profile-info {
  max-width: 1000px;
  margin: -60px auto 0;
  background: white;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.top-row { display: flex; align-items: center; gap: 20px; }
.avatar-small { width: 90px; height: 90px; border-radius: 50%; }
.name { font-size: 26px; font-weight: bold; }
.username { color: gray; }

.button {
  margin-left: auto;
  background: #3466ff;
  color: white;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
}

.stats { display: flex; gap: 15px; margin-top: 15px; }
.stat { background: #eee; padding: 8px 12px; border-radius: 20px; }

.tabs { display: flex; margin-top: 20px; border-bottom: 1px solid #ddd; }
.tab { padding: 10px 15px; cursor: pointer; }
.tab.active { border-bottom: 2px solid black; font-weight: bold; }

/* ROPA Y CONTENIDO */
.section { margin-top: 20px; }
.items { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
.item { background: #eee; width: 120px; padding: 10px; border-radius: 10px; text-align: center; }
.item img { width: 100%; }
</style>
</head>

<body>

<div class="navbar">
  <div class="nav-top">
    <div class="left">
      <img class="logo" src="https://cdn.discordapp.com/attachments/1498040372323024906/1499485928560001104/0eeeb19633422b1241f4306419a0f15f39d58de9.png?ex=69f4f898&is=69f3a718&hm=b60a2defde81b5002c5fffeca295bcd2f2dd4077ed4f651662ef70038badec08&">
    </div>
    <div class="center">
      <input placeholder="Buscar">
    </div>
    <div class="right">
      <button class="btn-primary">Registro</button>
      <button class="btn-outline">Iniciar sesión</button>
    </div>
  </div>
  <div class="nav-bottom">
    <span>Destacadas</span>
    <span>Mercado</span>
    <span>Crear</span>
    <span>Robux</span>
  </div>
</div>

<div class="header">
  <img id="avatar3d" class="avatar-3d">
</div>

<div class="profile-info">
  <div class="top-row">
    <img id="avatar" class="avatar-small">
    <div>
      <div id="displayName" class="name"></div>
      <div id="username" class="username"></div>
    </div>
    <div class="button">Añadir amistad</div>
  </div>

  <div class="stats">
    <div id="friends" class="stat"></div>
    <div id="followers" class="stat"></div>
    <div id="following" class="stat"></div>
  </div>

  <div class="tabs">
    <div class="tab active">Sobre mí</div>
    <div class="tab">Creaciones</div>
  </div>

  <div class="section">
    <p id="bio"></p>
  </div>

  <div class="section">
    <h3>Ropa actual</h3>
    <div class="items" id="items"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
// Carga de datos desde data.js
document.getElementById("avatar").src = data.avatar;
document.getElementById("avatar3d").src = data.avatar;
document.getElementById("displayName").innerText = data.displayName;
document.getElementById("username").innerText = "@" + data.username;
document.getElementById("friends").innerText = data.friends + " Amigos";
document.getElementById("followers").innerText = data.followers + " Seguidores";
document.getElementById("following").innerText = data.following + " Siguiendo";
document.getElementById("bio").innerText = data.bio;

const itemsDiv = document.getElementById("items");
data.items.forEach(item => {
  const div = document.createElement("div");
  div.className = "item";
  div.innerHTML = `<img src="${item.img}"><div>${item.name}</div>`;
  itemsDiv.appendChild(div);
});
</script>

</body>
</html>
